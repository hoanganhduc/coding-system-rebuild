# Field-in-file secrets that are not a flat NAME and not an OpenClaw provider.
# Each id maps to explicit targets (file + type + key/json-path). NO values here.
# Extend this when a new credential lives in a config file under a non-obvious field.
secrets:
  DEEPSEEK_API_KEY:
    description: DeepSeek API key (CodeWhale + DeepSeek CLIs, plaintext in their TOML configs)
    targets:
      - {file: .codewhale/config.toml, type: toml, key: api_key}
      - {file: .deepseek/config.toml,  type: toml, key: api_key}
