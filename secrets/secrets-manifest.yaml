# Secrets manifest — NAMES AND PATHS ONLY, never values. Safe to publish.
# Every entry is packed into the single AES-256 zip by bin/secrets-pack.sh and
# verified/restored by bin/secrets-verify.sh / bin/secrets-restore.sh.
#
# Fields: path ($HOME-relative; trailing / = tree; * = glob), mode (chmod after
# restore), required (pack fails if missing unless ALLOW_MISSING=1), feature
# (what breaks without it), obtain (where a new user gets it).
schema: coding-system.secrets-manifest.v1
dir_perms:
  .ssh: "0700"
  .config/coding-system: "0700"
  .config/send-email: "0700"
  .openclaw/credentials: "0700"
  .openclaw/identity: "0700"
  .codewhale/secrets: "0700"
  .deepseek/secrets: "0700"

entries:
  # ---- SSH / git / GitHub -------------------------------------------------
  - {path: .ssh/id_rsa,            mode: "0600", required: true,
     feature: "git push over SSH; all hoanganhduc repo access",
     obtain: "existing key, or ssh-keygen + add at github.com/settings/keys"}
  - {path: .ssh/id_rsa.pub,        mode: "0644", required: true,
     feature: "SSH public key", obtain: "pairs with id_rsa"}
  - {path: .ssh/kit_rsa,           mode: "0600", required: false,
     feature: "secondary host identity", obtain: "existing key"}
  - {path: .ssh/kit_rsa.pub,       mode: "0644", required: false,
     feature: "secondary host identity", obtain: "pairs with kit_rsa"}
  - {path: .ssh/aws-ubuntu.pem,    mode: "0400", required: false,
     feature: "AWS instance access", obtain: "AWS console key pair"}
  - {path: .ssh/config,            mode: "0644", required: false,
     feature: "ssh host aliases", obtain: "captured from live system"}
  - {path: .ssh/authorized_keys,   mode: "0600", required: false,
     feature: "inbound ssh to this machine", obtain: "captured"}
  - {path: .ssh/known_hosts,       mode: "0644", required: false,
     feature: "ssh host verification", obtain: "regenerates on connect"}
  - {path: .gitconfig,             mode: "0644", required: true,
     feature: "git identity + gh credential helper wiring",
     obtain: "captured; new user sets user.name/email"}
  - {path: .config/gh/hosts.yml,   mode: "0600", required: true,
     feature: "gh CLI auth; HTTPS git pushes; GitHub MCP",
     obtain: "gh auth login"}
  - {path: .config/gh/config.yml,  mode: "0600", required: false,
     feature: "gh CLI preferences (git_protocol, editor, aliases, pager) — restores
       identical gh behavior; non-secret personal state",
     obtain: "captured; gh recreates defaults, or `gh config set <key> <value>`"}

  # ---- infra tokens -------------------------------------------------------
  - {path: .docker/config.json,    mode: "0600", required: false,
     feature: "registry logins (ghcr.io) for private image pulls — not present on the
       source machine today; create via `docker login ghcr.io` if images go private",
     obtain: "docker login ghcr.io with a GitHub PAT (read:packages)"}
  - {path: .config/rclone/rclone.conf, mode: "0600", required: false,
     feature: "rclone remotes (Drive/WebDAV sync)", obtain: "rclone config"}
  - {path: .modal.toml,            mode: "0600", required: false,
     feature: "modal-research-compute broker", obtain: "modal token new"}
  - {path: .config/coding-system/tailscale.env, mode: "0600", required: false,
     feature: "unattended `tailscale up` on restore (TS_AUTHKEY=..., TS_HOSTNAME=openclaw
       keeps funnel/webhook URLs valid); without it,
       interactive `sudo tailscale up` re-auth",
     obtain: "login.tailscale.com/admin/settings/keys — reusable auth key"}
  - {path: .secrets.env,           mode: "0600", required: true,
     feature: "shell env: TELEGRAM_BOT_TOKEN/CHAT_ID (file delivery), OCRSPACE_API_KEY,
       LEANEXPLORE_API_KEY (lean-explore MCP), MOLTBOOK_* agent config",
     obtain: "generated from ~/.bashrc by bin/init-private.sh; new user fills template"}
  - {path: .config/coding-system/leak-denylist.txt, mode: "0600", required: true,
     feature: "leak-scan layer 3 (personal low-entropy IDs)",
     obtain: "seeded by bin/init-private.sh"}
  - {path: .config/coding-system/secrets-meta.json, mode: "0600", required: false,
     feature: "pack metadata (timestamps, sha256s) for verify", obtain: "generated"}

  # ---- Claude Code --------------------------------------------------------
  - {path: .claude/secrets.json,   mode: "0600", required: true,
     feature: "ALL Claude Code research skills (Zotero, Calibre/Drive, Telegram,
       digests, VNU eOffice, providers...) — 16 keys, see docs/SECRETS.md",
     obtain: "per-key table in docs/SECRETS.md"}
  - {path: .claude/.credentials.json, mode: "0600", required: false,
     feature: "Claude Code OAuth session (re-auth: `claude login`)", obtain: "claude login"}
  - {path: .claude/skills/zotero/config.json,  mode: "0644", required: true,
     feature: "Zotero library id, WebDAV url, Drive folder, ZotFile pattern",
     obtain: "captured; new user edits ids"}
  - {path: .claude/skills/calibre/config.json, mode: "0644", required: true,
     feature: "Calibre Drive folder id + delivery channel", obtain: "captured"}
  - {path: .local/share/ai-agents-skills/runtime/workspace/config/research-compute.toml,
     mode: "0644", required: false,
     feature: "research_compute broker per-install config ([gha] private-repo targets +
       minute budgets; no tokens — the gh token comes from gh auth). In the zip because it
       names private research repos.",
     obtain: "broker `bootstrap` regenerates a starter from the example; re-add [gha].repos"}
  - {path: .codex/runtime/workspace/.secrets.json, mode: "0600", required: false,
     feature: "ai-agents-skills runtime secrets (AAS_SECRETS_FILE) for the Codex runtime:
       send-email SMTP host/user/password + sender identity, plus any other AAS skill
       secrets read from the runtime workspace. Holds one or more smtp profiles.",
     obtain: "create the smtp{} object per the send-email skill SKILL.md"}
  - {path: .local/share/ai-agents-skills/runtime/workspace/.secrets.json, mode: "0600", required: false,
     feature: "ai-agents-skills runtime secrets (AAS_SECRETS_FILE) for the multi-agent
       runtime root — same role as the Codex one; whichever runtime root a skill runs
       under is the one read.",
     obtain: "create the smtp{} object per the send-email skill SKILL.md"}
  - {path: .codex/runtime/workspace/.address-book.json, mode: "0600", required: false,
     feature: "send-email address book (saved recipient addresses) for the Codex runtime —
       personal state, restored so saved contacts survive a rebuild.",
     obtain: "accumulated via send --save-recipients / contacts --add"}
  - {path: .local/share/ai-agents-skills/runtime/workspace/.address-book.json, mode: "0600", required: false,
     feature: "send-email address book for the multi-agent runtime root — same role.",
     obtain: "accumulated via send --save-recipients / contacts --add"}
  - {path: .config/send-email/secrets.json, mode: "0600", required: false,
     feature: "send-email shared secrets/config — one SMTP config for ALL install
       targets via AAS_ALLOW_EXTERNAL_SECRETS_FILE=1 + AAS_SECRETS_FILE pointing here
       (exports live in .secrets.env). Holds the smtp{}/accounts{} block + identity.",
     obtain: "create the smtp{} object per the send-email skill SKILL.md"}
  - {path: .openclaw/workspace/.config/send-email/secrets.json, mode: "0600", required: false,
     feature: "send-email config copy for the OpenClaw sandbox (mounted at /workspace,
       read via AAS_SECRETS_FILE; .config is .stignore'd so it never syncs). Copy of
       .config/send-email/secrets.json.",
     obtain: "install -m 600 ~/.config/send-email/secrets.json into ~/.openclaw/workspace/.config/send-email/"}
  - {path: .claude/learnings/,     mode: "0644", required: false,
     feature: "self-improvement learnings (accumulated)", obtain: "accumulated state"}
  - {path: .claude/projects/-home-ubuntu/memory/, mode: "0644", required: false,
     feature: "persistent agent memory (user prefs, feedback, references)",
     obtain: "accumulated state"}

  # ---- Codex / Copilot / CodeWhale / DeepSeek / Gemini --------------------
  - {path: .codex/auth.json,       mode: "0600", required: true,
     feature: "Codex CLI entirely (re-auth: codex login)", obtain: "codex login"}
  - {path: .copilot/mcp-config.json, mode: "0600", required: false,
     feature: "Copilot MCP servers (embedded tokens)", obtain: "captured"}
  - {path: .codewhale/config.toml, mode: "0600", required: true,
     feature: "CodeWhale CLI (plaintext DeepSeek api_key inside)",
     obtain: "platform.deepseek.com API key"}
  - {path: .codewhale/secrets/,    mode: "0600", required: false,
     feature: "CodeWhale secret store", obtain: "captured"}
  - {path: .deepseek/config.toml,  mode: "0600", required: true,
     feature: "DeepSeek CLI (plaintext api_key inside)", obtain: "platform.deepseek.com"}
  - {path: .deepseek/secrets/,     mode: "0600", required: false,
     feature: "DeepSeek secret store", obtain: "captured"}
  - {path: .deepseek/memory/,      mode: "0644", required: false,
     feature: "DeepSeek agent memory", obtain: "accumulated state"}
  - {path: .deepseek/.learnings/,  mode: "0644", required: false,
     feature: "DeepSeek learnings", obtain: "accumulated state"}
  - {path: .deepseek/codex-research-integration-implementation.md, mode: "0644",
     required: false, feature: "integration design notes (personal)", obtain: "captured"}
  - {path: .deepseek/codex-research-integration-plan.md, mode: "0644",
     required: false, feature: "integration design notes (personal)", obtain: "captured"}
  - {path: .config/deepseek/settings.toml, mode: "0600", required: false,
     feature: "DeepSeek desktop/CLI settings (may embed key)", obtain: "captured"}
  - {path: .gemini/antigravity-cli/antigravity-oauth-token, mode: "0600", required: false,
     feature: "Gemini/AntiGravity CLI auth (re-auth via its login flow)", obtain: "login"}

  # ---- OpenClaw -----------------------------------------------------------
  - {path: .openclaw/openclaw.json, mode: "0600", required: false,
     feature: "exact-replica OpenClaw config (otherwise restored from the public
       template with placeholders to fill)", obtain: "captured"}
  - {path: .openclaw/cron/jobs.json.migrated, mode: "0600", required: false,
     feature: "live OpenClaw cron job state", obtain: "captured"}
  - {path: .openclaw/secrets.json, mode: "0600", required: true,
     feature: "OpenClaw providers + channels (Telegram, Zulip, gateway token...)",
     obtain: "per-key table in docs/SECRETS.md"}
  - {path: .openclaw/secrets.json.bak.*, mode: "0600", required: false,
     feature: "secrets backup copy", obtain: "captured"}
  - {path: .openclaw/credentials/, mode: "0600", required: true,
     feature: "channel pairing/allowlists, github-copilot token, WhatsApp session",
     obtain: "re-pair channels if absent"}
  - {path: .openclaw/identity/,    mode: "0600", required: true,
     feature: "OpenClaw device identity", obtain: "regenerated on first run if absent"}
  - {path: .openclaw/agents/*/agent/auth-profiles.json, mode: "0600", required: true,
     feature: "per-agent provider auth (plaintext keys) — main/host/moltbook/review/
       moltbook-reviewer/sanitizer", obtain: "captured; keys per docs/SECRETS.md"}
  - {path: .openclaw/moltbook.env, mode: "0600", required: false,
     feature: "moltbook agent env (gateway drop-in EnvironmentFile)", obtain: "captured"}
  - {path: .openclaw/workspace/.secrets.json, mode: "0600", required: true,
     feature: "sandbox-side secrets mirror", obtain: "copy of .openclaw/secrets.json"}
  - {path: .config/openclaw/google-chat/*.json,
     mode: "0644", required: false,
     feature: "Google Chat service-account (webhook channel) — glob so the app-id
       filename never appears in this public manifest",
     obtain: "GCP console service account JSON"}
  - {path: .openclaw/workspace/data/writing-style.md, mode: "0644", required: false,
     feature: "personal writing-style profile (private, never public)",
     obtain: "accumulated state"}

  # ---- per-tool credentials ------------------------------------------------
  - {path: .config/moltbook/credentials.json, mode: "0600", required: false,
     feature: "moltbook API auth", obtain: "moltbook account"}
  - {path: .config/getscipapers/*/credentials.json, mode: "0600", required: false,
     feature: "paper retrieval services (ablesci/facebook/getpapers/libgen/nexus/
       scinet/wosonhj/zlib) — each degrades individually", obtain: "per-service account"}
  - {path: .config/course/mat1204/credentials.json, mode: "0600", required: false,
     feature: "course system token", obtain: "course platform"}

  # ---- OpenClaw workspace skill configs (personal IDs) ----------------------
  - {path: .openclaw/workspace/skills/zotero/config.json,  mode: "0644", required: false,
     feature: "OpenClaw-side Zotero skill config", obtain: "captured"}
  - {path: .openclaw/workspace/skills/calibre/config.json, mode: "0644", required: false,
     feature: "OpenClaw-side Calibre skill config", obtain: "captured"}
